app = "ians-music-backend"
primary_region = "dfw"

[build]

[env]
  DB_PATH = "/data/openmusic.db"
  CACHE_DIR = "/data/cache"
  MAX_CACHE_SIZE_GB = "1"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[mounts]]
  source = "openmusic_data"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
